<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Primitive Peer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="minigame.css">
</head>
<body>
  <div id="ui-layer">
    
    <!-- MAIN MENU -->
    <div id="main-menu" class="screen">
      <h1>The Primitive Peer</h1>
      <p>Cavemen vs Time Travelers</p>
      <input type="text" id="player-name" placeholder="Enter your name" maxlength="15">
      <br>
      <button id="create-btn">Create Lobby</button>
      <br><br>
      <input type="text" id="room-code-input" placeholder="Room Code (4 Letters)" maxlength="4" style="text-transform:uppercase">
      <br>
      <button id="join-btn">Join Lobby</button>
      <div id="error-msg" style="color:#e74c3c; margin-top:10px;"></div>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen hidden">
      <h2>Lobby: <span id="current-room-code">XXXX</span></h2>
      <p id="host-status" style="color: #f1c40f; font-weight:bold;"></p>
      
      <div id="player-list">Waiting for players...</div>
      
      <!-- HOST CONTROLS -->
      <div id="host-controls" class="hidden">
         <p style="font-size: 12px; color: #7f8c8d;">Minimum 4 players required to start. Max 10.</p>
         <button id="start-btn" disabled>Start Game (Waiting for 4+)</button>
      </div>

      <!-- NON HOST MSG -->
      <p id="wait-msg" class="hidden" style="color: #bdc3c7;">Waiting for Host to start the game...</p>
    </div>
    
    <!-- GAME HUD -->
    <div id="game-ui" class="hidden">
      <div id="role-display">Role: <span id="role-text">Crewmate</span></div>
      <button id="action-btn" class="hidden">Club [Space]</button>
    </div>
    
    <!-- END GAME SCREEN -->
    <div id="end-screen" class="screen hidden">
      <h2 id="end-text">Game Over</h2>
      <button id="restart-btn">Leave Game</button>
    </div>
  </div>
  
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <!-- TASK MINIGAME MODAL -->
  <div id="task-modal">
    <div class="modal-card">
      <div class="modal-header">
        <span class="task-icon" id="modal-icon">⚙️</span>
        <h2 id="modal-title">Task Name</h2>
        <div class="modal-stage-label" id="modal-stage-label">Stage 1 / 2</div>
      </div>
      <div class="modal-progress-bar">
        <div class="modal-progress-fill" id="modal-progress-fill" style="width:0%"></div>
      </div>

      <!-- STAGE 1: Minigame -->
      <div id="minigame-stage">
        <p id="minigame-instructions" style="color:#bdc3c7; font-size:13px; margin-bottom:12px;"></p>
        <div id="minigame-canvas-wrap">
          <!-- dynamic content injected here -->
        </div>
        <div class="modal-footer">
          <button class="modal-cancel-btn" id="modal-close-btn">Cancel</button>
          <div class="feedback-msg" id="mg-feedback"></div>
        </div>
      </div>

      <!-- STAGE 2: Coding Question -->
      <div id="coding-stage">
        <div class="lang-badge" id="coding-lang">JavaScript</div>
        <p id="coding-prompt" style="color:#bdc3c7; font-size:14px; margin-bottom:10px;"></p>
        <div class="code-block" id="coding-code"></div>
        <div class="feedback-msg" id="coding-feedback"></div>
        <div id="coding-answer-area"></div>
        <div class="modal-footer">
          <button class="modal-cancel-btn" id="coding-cancel-btn">Cancel</button>
          <div class="attempt-indicator" id="attempt-indicator"></div>
          <button class="modal-submit-btn" id="coding-submit-btn">Submit Answer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
  <script src="minigame.js"></script>
</body>
</html>
